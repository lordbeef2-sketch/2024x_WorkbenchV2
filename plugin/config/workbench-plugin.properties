# Backing-store config file for the TWC Workbench Cameo plugin.
# Prefer changing these through:
#   TWC Workbench -> Configure Workbench Connection...
#
# Workbench ingest base URL, without a trailing slash.
# Example: https://tx22svaw6159.northgrum.com:8050
workbench.baseUrl=

# Bearer token used by the plugin to post snapshots/deltas into Workbench.
workbench.ingestToken=

# If ingest is not configured, JSON payloads are written here relative to the plugin directory.
export.outputDir=exports

# Whether to capture a baseline snapshot when a project opens.
capture.snapshotOnOpen=true

# Whether to publish a full snapshot when a project is saved.
capture.snapshotOnSave=true

# Whether to compute and publish a delta when the project closes.
capture.deltaOnClose=true

# HTTP timeout values for Workbench ingest calls.
http.connectTimeoutSeconds=15
http.readTimeoutSeconds=60

# Metadata used to key cache records inside Workbench.
# metadata.serverId must match the Workbench server profile id exactly
# (for example: twc-2022x or twc-2024x).
# Example:
# metadata.serverId=twc-2022x
# metadata.resourceId is usually auto-resolved from the remote TWC project URL.
# When resourceId resolves, the plugin also uses it as projectId so the cache
# lands under the same project the Workbench UI/API already knows.
metadata.workspaceId=
metadata.serverId=
metadata.resourceId=
